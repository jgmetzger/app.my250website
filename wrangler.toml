name = "app-my250website"
main = "apps/api/src/index.ts"
compatibility_date = "2024-09-25"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

# Build the React frontend before bundling the Worker. wrangler runs this
# automatically before every `wrangler deploy` / `versions upload`, so the
# Cloudflare build pipeline doesn't need a separate Build command.
[build]
command = "pnpm build:web"

[vars]
SENDER_EMAIL = "hi@my250website.com"
SENDER_NAME = "James Metzger"
DAILY_EMAIL_CAP = "15"

[observability]
enabled = true

# Static assets — serves the React frontend (apps/web/dist) at every URL
# that isn't /api/*. Single deploy, single domain. Requires `pnpm build:web`
# to have run before `wrangler deploy` so apps/web/dist exists.
[assets]
directory = "apps/web/dist"
binding = "ASSETS"
not_found_handling = "single-page-application"

# ---------------------------------------------------------------------------
# OPTIONAL BLOCKS — uncomment only AFTER each precondition is met.
# Until then they're commented so the Worker deploys successfully on a fresh
# Cloudflare account with zero clicks. Once deploy is green you'll get a
# *.workers.dev URL and can layer the rest in.
# ---------------------------------------------------------------------------

# 1) CUSTOM DOMAIN ROUTE
#    Precondition: my250website.com added to your Cloudflare account
#                  (Add a Site → free plan → switch nameservers).
#    Then uncomment:
#
# [[routes]]
# pattern = "app.my250website.com/api/*"
# zone_name = "my250website.com"
# custom_domain = false

# 2) D1 DATABASE
[[d1_databases]]
binding = "DB"
database_name = "wfbr-crm"
database_id = "91b0227a-e781-469e-a264-811e285d6e93"
migrations_dir = "migrations"

# 3) BROWSER RENDERING — no longer used.
# Scraping moved from headless Chromium to the Google Places API
# (see apps/api/src/scrape/places.ts), which is faster, more reliable,
# and free up to ~6,000 lookups/month under Google Cloud's $200/mo
# free credit. Workers Paid plan no longer required for this app.
#
# [browser]
# binding = "BROWSER"

# Secrets are set in the dashboard, NOT in this file:
#   Workers & Pages → app-my250website-api → Settings → Variables and Secrets
#   → "Encrypt" each value.
#
# Names: APP_PASSWORD, JWT_SECRET, RESEND_API_KEY, RESEND_WEBHOOK_SECRET,
#        TWILIO_ACCOUNT_SID, TWILIO_AUTH_TOKEN, TWILIO_API_KEY,
#        TWILIO_API_SECRET, TWILIO_TWIML_APP_SID, TWILIO_PHONE_NUMBER,
#        BROWSER_RENDERING_TOKEN (only if using Browserless fallback)
